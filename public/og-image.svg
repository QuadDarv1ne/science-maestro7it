<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="50%" stop-color="#110c08"/>
      <stop offset="100%" stop-color="#0d0908"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7a224"/>
      <stop offset="50%" stop-color="#e89020"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.3" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#f7a224" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f7a224" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.8" cy="0.7" r="0.4">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative constellation dots -->
  <g fill="#f7a224" opacity="0.35">
    <circle cx="120" cy="120" r="2"/>
    <circle cx="180" cy="200" r="1.5"/>
    <circle cx="80" cy="280" r="2"/>
    <circle cx="220" cy="380" r="1.5"/>
    <circle cx="950" cy="100" r="2"/>
    <circle cx="1050" cy="180" r="1.5"/>
    <circle cx="1100" cy="300" r="2"/>
    <circle cx="1000" cy="450" r="1.5"/>
    <circle cx="1080" cy="540" r="2"/>
  </g>
  <g stroke="#f7a224" stroke-width="0.5" opacity="0.2" fill="none">
    <line x1="120" y1="120" x2="180" y2="200"/>
    <line x1="180" y1="200" x2="80" y2="280"/>
    <line x1="80" y1="280" x2="220" y2="380"/>
    <line x1="950" y1="100" x2="1050" y2="180"/>
    <line x1="1050" y1="180" x2="1100" y2="300"/>
    <line x1="1100" y1="300" x2="1000" y2="450"/>
    <line x1="1000" y1="450" x2="1080" y2="540"/>
  </g>

  <!-- Accent vertical line on left -->
  <rect x="80" y="200" width="4" height="230" rx="2" fill="url(#accentGrad)"/>

  <!-- ORCID badge -->
  <g transform="translate(80, 130)">
    <rect width="280" height="32" rx="16" fill="#1a1410" stroke="#f7a224" stroke-opacity="0.3"/>
    <circle cx="20" cy="16" r="5" fill="#f7a224"/>
    <text x="36" y="21" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#9e978f" letter-spacing="0.5">ORCID: 0009-0007-7605-539X</text>
  </g>

  <!-- Main title -->
  <text x="80" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700" fill="#f3ede6" letter-spacing="-2">
    Дуплей Максим
  </text>
  <text x="80" y="395" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700" fill="url(#accentGrad)" letter-spacing="-2">
    Игоревич
  </text>

  <!-- Subtitle -->
  <text x="82" y="455" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#9e978f">
    Старший преподаватель ИТ · Аналитик · Философ · Музыкант · DevOps-инженер
  </text>

  <!-- Stats row -->
  <g transform="translate(82, 510)">
    <g>
      <text x="0" y="0" font-family="Georgia, serif" font-size="44" font-weight="700" fill="url(#accentGrad)">30</text>
      <text x="0" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#9e978f" letter-spacing="1.5">ПУБЛИКАЦИЙ</text>
    </g>
    <g transform="translate(140, 0)">
      <text x="0" y="0" font-family="Georgia, serif" font-size="44" font-weight="700" fill="url(#accentGrad)">14</text>
      <text x="0" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#9e978f" letter-spacing="1.5">ПРОЕКТОВ</text>
    </g>
    <g transform="translate(280, 0)">
      <text x="0" y="0" font-family="Georgia, serif" font-size="44" font-weight="700" fill="url(#accentGrad)">9</text>
      <text x="0" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#9e978f" letter-spacing="1.5">НАПРАВЛЕНИЙ</text>
    </g>
    <g transform="translate(420, 0)">
      <text x="0" y="0" font-family="Georgia, serif" font-size="44" font-weight="700" fill="url(#accentGrad)">5</text>
      <text x="0" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#9e978f" letter-spacing="1.5">ТЕМ ОФОРМЛЕНИЯ</text>
    </g>
  </g>

  <!-- Domain tags at bottom right -->
  <g transform="translate(900, 540)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#f7a224">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#1a1410" stroke="#f7a224" stroke-opacity="0.25"/>
    <text x="40" y="16" text-anchor="middle">ИИ · ML</text>
    <rect x="90" y="0" width="110" height="24" rx="12" fill="#1a1410" stroke="#f7a224" stroke-opacity="0.25"/>
    <text x="145" y="16" text-anchor="middle">ОБРАЗОВАНИЕ</text>
    <rect x="210" y="0" width="80" height="24" rx="12" fill="#1a1410" stroke="#f7a224" stroke-opacity="0.25"/>
    <text x="250" y="16" text-anchor="middle">DevOps</text>
  </g>
</svg>
