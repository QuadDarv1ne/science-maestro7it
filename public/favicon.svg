<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0d0908"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7a224"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#f7a224" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Letter Д (Cyrillic) — simplified geometric form -->
  <g fill="url(#accent)">
    <!-- Left vertical + top horizontal forming Г-shape -->
    <rect x="16" y="14" width="22" height="6" rx="1.5"/>
    <rect x="16" y="14" width="6" height="36" rx="1.5"/>
    <!-- Inner horizontal stroke (decorative serif) -->
    <rect x="22" y="26" width="14" height="3.5" rx="1"/>
    <!-- Right vertical -->
    <rect x="32" y="14" width="6" height="36" rx="1.5"/>
    <!-- Bottom horizontal connecting legs -->
    <rect x="16" y="44" width="22" height="6" rx="1.5"/>
    <!-- Left leg -->
    <path d="M 19 50 L 12 56 L 18 56 L 25 50 Z"/>
    <!-- Right leg -->
    <path d="M 45 50 L 52 56 L 46 56 L 39 50 Z"/>
  </g>
  <!-- Dot accent -->
  <circle cx="48" cy="20" r="3" fill="#f7a224"/>
</svg>
